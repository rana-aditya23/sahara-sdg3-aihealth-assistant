<div id="sahara-root"></div>
<style>
  #sahara-root {
    --teal-deep: #0B5563;
    --teal-dark: #07343D;
    --teal: #0E8C8C;
    --mint: #DFF3EE;
    --mint-card: #F4FAF9;
    --amber: #F2A541;
    --danger: #C24545;
    --ink: #16262B;
    --slate: #5C7479;
    --white: #FFFFFF;
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    color: var(--ink);
    max-width: 760px;
    margin: 0 auto;
    background: transparent;
  }

  #sahara-root * { box-sizing: border-box; }

  .sahara-shell {
    background: var(--teal-dark);
    border-radius: 22px;
    padding: 18px;
    box-shadow: 0 18px 40px rgba(7,52,61,0.25);
  }

  .sahara-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 10px 16px 10px;
  }
  .sahara-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--teal);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sahara-avatar svg { width: 22px; height: 22px; fill: white; }
  .sahara-title { color: white; font-weight: 700; font-size: 16px; line-height: 1.2; }
  .sahara-subtitle { color: #9FD8D4; font-size: 12px; margin-top: 2px; }
  .sahara-status {
    margin-left: auto;
    font-size: 11px;
    color: #9FD8D4;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ADE9A; }

  .sahara-disclaimer {
    background: rgba(255,255,255,0.06);
    color: #C7E8E5;
    font-size: 11.5px;
    border-radius: 10px;
    padding: 9px 12px;
    margin: 0 10px 12px 10px;
    line-height: 1.4;
  }

  .sahara-window {
    background: var(--mint-card);
    border-radius: 14px;
    height: 420px;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .msg-row { display: flex; gap: 8px; max-width: 88%; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.bot { align-self: flex-start; }

  .msg-bubble {
    padding: 10px 13px;
    border-radius: 13px;
    font-size: 13.5px;
    line-height: 1.45;
  }
  .msg-row.user .msg-bubble {
    background: var(--teal);
    color: white;
    border-radius: 13px 13px 4px 13px;
  }
  .msg-row.bot .msg-bubble {
    background: white;
    border: 1px solid #DCEAE8;
    color: var(--ink);
    border-radius: 13px 13px 13px 4px;
  }
  .msg-row.bot .msg-bubble.urgent {
    background: #FDF1ED;
    border: 1px solid #F2C9B8;
  }
  .msg-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 5px;
    color: var(--teal);
  }
  .msg-tag.urgent { color: var(--danger); }
  .msg-tag svg { width: 11px; height: 11px; }

  .bot-icon-sm {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--teal-deep);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bot-icon-sm svg { width: 14px; height: 14px; fill: white; }

  .typing-dots { display: flex; gap: 3px; padding: 4px 2px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #9FBFBC;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }

  .sahara-suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 10px 0 10px;
  }
  .chip {
    background: rgba(255,255,255,0.08);
    color: #DCEFEC;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .chip:hover { background: rgba(255,255,255,0.18); }

  .sahara-inputbar {
    display: flex;
    gap: 8px;
    padding: 14px 10px 4px 10px;
  }
  .sahara-input {
    flex: 1;
    background: white;
    border: none;
    border-radius: 22px;
    padding: 11px 16px;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
  }
  .sahara-input::placeholder { color: #9AA9AC; }
  .sahara-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--teal);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease;
  }
  .sahara-send:hover { background: #0aa3a3; }
  .sahara-send svg { width: 17px; height: 17px; fill: white; }

  .pipeline-note {
    margin-top: 14px;
    font-size: 11px;
    color: var(--slate);
    text-align: center;
    line-height: 1.5;
  }
  .pipeline-note b { color: var(--teal-deep); }

  .sahara-window::-webkit-scrollbar { width: 6px; }
  .sahara-window::-webkit-scrollbar-thumb { background: #C9DEDB; border-radius: 3px; }
</style>

<script>
(function() {
  const root = document.getElementById('sahara-root');

  const ICONS = {
    heart: '<svg viewBox="0 0 24 24"><path d="M12 21s-7.2-4.6-9.8-9C.6 8.7 1.4 5 4.7 3.7 7 2.8 9.4 3.7 11 5.7l1 1.2 1-1.2c1.6-2 4-2.9 6.3-2 3.3 1.3 4.1 5 2.5 8.3-2.6 4.4-9.8 9-9.8 9z"/></svg>',
    shield: '<svg viewBox="0 0 24 24"><path d="M12 2l8 3v6c0 5-3.5 9-8 11-4.5-2-8-6-8-11V5l8-3z"/></svg>',
    warn: '<svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 6v6m0 3h0"/></svg>',
    check: '<svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z"/></svg>',
    send: '<svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>',
  };

  // ---- mini knowledge base (RAG-style lookup) ----
  const KB = [
    {
      tag: 'fever', triggers: ['fever', 'temperature', 'hot body', 'chills'],
      response: "I'm not a doctor, but here's general guidance: rest, drink fluids, and a fever-reducer like paracetamol (per label dosage) is commonly suggested for mild fever. Keep checking your temperature every few hours.",
      source: 'Source: general public-health guidance on managing mild fever at home.'
    },
    {
      tag: 'cold-cough', triggers: ['cold', 'cough', 'sore throat', 'runny nose', 'sneezing'],
      response: "Common cold symptoms usually ease within 7\u201310 days with rest, warm fluids, and steam inhalation. Honey and warm water can soothe a sore throat for adults.",
      source: 'Source: general respiratory self-care guidance.'
    },
    {
      tag: 'stomach', triggers: ['stomach', 'diarrhea', 'diarrhoea', 'vomiting', 'nausea', 'loose motion'],
      response: "For mild stomach upset, oral rehydration (ORS or a pinch of salt + sugar in clean water) and bland food like rice or bananas are generally recommended. Avoid oily or spicy food until it settles.",
      source: 'Source: WHO-style oral rehydration guidance.'
    },
    {
      tag: 'hygiene', triggers: ['hygiene', 'handwashing', 'wash hands', 'sanitation'],
      response: "Handwashing with soap for at least 20 seconds \u2014 especially before eating and after using the toilet \u2014 is one of the most effective ways to prevent infections from spreading.",
      source: 'Source: public hygiene awareness guidance.'
    },
    {
      tag: 'hydration', triggers: ['water intake', 'hydration', 'how much water', 'dehydration'],
      response: "Most adults benefit from roughly 2\u20133 litres of water a day, more in hot weather or with physical activity. Pale yellow urine is usually a good sign of adequate hydration.",
      source: 'Source: general nutrition and hydration guidance.'
    },
    {
      tag: 'nutrition', triggers: ['nutrition', 'diet', 'healthy food', 'balanced meal'],
      response: "A simple way to think about meals: fill half your plate with vegetables/fruit, a quarter with whole grains, and a quarter with protein (dal, eggs, fish, or lean meat).",
      source: 'Source: general dietary guidance.'
    },
  ];

  // red-flag emergency keywords -> always escalate, overrides KB tone
  const RED_FLAGS = [
    'breathless', 'breathing difficulty', "can't breathe", 'cannot breathe', 'chest pain',
    'severe bleeding', 'unconscious', 'fainted', 'seizure', 'blue lips', 'severe pain',
    'suicide', 'self harm', 'poisoning', 'snake bite', 'stroke', 'paralysis'
  ];

  function detectIntent(text) {
    const t = text.toLowerCase();
    const flagged = RED_FLAGS.some(f => t.includes(f));
    let match = null;
    for (const item of KB) {
      if (item.triggers.some(trig => t.includes(trig))) { match = item; break; }
    }
    return { flagged, match };
  }

  function buildResponse(userText, conversationHadSymptom) {
    const { flagged, match } = detectIntent(userText);

    if (flagged) {
      return {
        urgent: true,
        tag: 'Safety escalation',
        text: "What you're describing could be serious. Please seek immediate medical care \u2014 visit the nearest hospital/clinic or call local emergency services now. This is not something to manage from home or wait out.",
      };
    }

    if (match) {
      return {
        urgent: false,
        tag: 'Retrieved guidance',
        text: match.response + '\n\n' + match.source + '\n\nIf symptoms last more than 2\u20133 days, worsen, or new symptoms appear, please consult a doctor.',
      };
    }

    return {
      urgent: false,
      tag: 'General guidance',
      text: "I don't have specific guidance on that in my knowledge base yet. For anything beyond general wellness questions, please consult a qualified doctor or your nearest health centre \u2014 I'd rather say that clearly than guess.",
    };
  }

  const SUGGESTIONS = [
    "I have a mild fever since morning",
    "How much water should I drink daily?",
    "I have stomach pain and diarrhea",
    "I feel breathless and dizzy",
  ];

  let messages = [
    { from: 'bot', tag: 'Welcome', text: "Hi, I'm SAHARA \u2014 a health-literacy assistant. Tell me your symptom or question in your own words. I give general guidance only, never a diagnosis, and I'll always tell you when to see a real doctor." }
  ];

  function render() {
    root.innerHTML = `
      <div class="sahara-shell">
        <div class="sahara-header">
          <div class="sahara-avatar">${ICONS.heart}</div>
          <div>
            <div class="sahara-title">SAHARA Assistant</div>
            <div class="sahara-subtitle">AI Health Literacy \u2014 SDG 3 Prototype</div>
          </div>
          <div class="sahara-status"><span class="dot"></span> Live demo</div>
        </div>
        <div class="sahara-disclaimer">
          ${ICONS.shield.replace('<svg', '<svg style="width:12px;height:12px;display:inline;vertical-align:-2px;fill:#9FD8D4;margin-right:4px;"')}
          This is a project prototype for educational demonstration. It does not store data, diagnose conditions, or replace professional medical advice.
        </div>
        <div class="sahara-window" id="sahara-window"></div>
        <div class="sahara-suggestions" id="sahara-chips"></div>
        <div class="sahara-inputbar">
          <input class="sahara-input" id="sahara-input" type="text" placeholder="Describe your symptom or question..." />
          <button class="sahara-send" id="sahara-send" aria-label="Send">${ICONS.send}</button>
        </div>
      </div>
      <div class="pipeline-note">Pipeline: <b>Input</b> &rarr; <b>Intent detection</b> &rarr; <b>Retrieval (RAG)</b> &rarr; <b>Safety check</b> &rarr; <b>Grounded response</b></div>
    `;

    const win = root.querySelector('#sahara-window');
    messages.forEach(m => {
      const row = document.createElement('div');
      row.className = 'msg-row ' + m.from;
      if (m.from === 'bot') {
        const icon = document.createElement('div');
        icon.className = 'bot-icon-sm';
        icon.innerHTML = ICONS.heart;
        row.appendChild(icon);
      }
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble' + (m.urgent ? ' urgent' : '');
      let inner = '';
      if (m.tag) {
        const tagIcon = m.urgent ? ICONS.warn : ICONS.check;
        inner += `<div class="msg-tag${m.urgent ? ' urgent' : ''}">${tagIcon}${m.tag}</div>`;
      }
      inner += m.text.split('\n').map(line => `<div>${line || '&nbsp;'}</div>`).join('');
      bubble.innerHTML = inner;
      row.appendChild(bubble);
      win.appendChild(row);
    });
    win.scrollTop = win.scrollHeight;

    const chips = root.querySelector('#sahara-chips');
    SUGGESTIONS.forEach(s => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = s;
      chip.onclick = () => sendMessage(s);
      chips.appendChild(chip);
    });

    const input = root.querySelector('#sahara-input');
    const sendBtn = root.querySelector('#sahara-send');
    sendBtn.onclick = () => {
      const v = input.value.trim();
      if (v) sendMessage(v);
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') {
        const v = input.value.trim();
        if (v) sendMessage(v);
      }
    };
  }

  function sendMessage(text) {
    messages.push({ from: 'user', text });
    render();
    const input = root.querySelector('#sahara-input');
    if (input) input.value = '';

    // typing indicator
    const win = root.querySelector('#sahara-window');
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row bot';
    typingRow.innerHTML = `<div class="bot-icon-sm">${ICONS.heart}</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    win.appendChild(typingRow);
    win.scrollTop = win.scrollHeight;

    setTimeout(() => {
      const res = buildResponse(text);
      messages.push({ from: 'bot', tag: res.tag, text: res.text, urgent: res.urgent });
      render();
    }, 700);
  }

  render();
})();
</script>
</div>
